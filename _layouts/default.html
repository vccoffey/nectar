<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="{{ '/assets/css/main.css' | relative_url }}"
      as="style"
    />
    <meta
      name="description"
      content="{{ page.description | default: site.description }}"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Nunito:wght@300;400;600&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Nunito:wght@300;400;600&display=swap"
      />
    </noscript>
    <link
      rel="preload"
      href="{{ '/assets/fonts/girolight001-webfont.woff2' | relative_url }}"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" />
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  </head>
  <body>
    <div class="hero-sticky-wrapper">
      <section class="hero">
        <p class="above-title hero-scale">Welcome To</p>
        <h1>Nectar</h1>
        <p class="subtitle">Fusion</p>
        <p class="below-title hero-scale">Playground</p>
      </section>
    </div>
    <main>{{ content }}</main>

    <footer>
      <p>original art by <a href="https://www.jasminecoart.com/">Jasmine Co</a></p>
    </footer>

    <script>
      const fmt = { date: { dateStyle: 'long' }, time: { timeStyle: 'short' } }

      document.querySelectorAll('.event-meta time[datetime]').forEach((el) => {
        const [y, m, d] = el.getAttribute('datetime').split('-').map(Number)
        const date = new Date(y, m - 1, d)
        if (!isNaN(date)) {
          el.textContent = new Intl.DateTimeFormat(undefined, fmt.date).format(
            date
          )
        }
      })

      document.querySelectorAll('.event-meta .event-time').forEach((el) => {
        const dateStr = el.getAttribute('data-date')
        const timeStr = el.getAttribute('data-time')
        const match = timeStr?.match(
          /(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/
        )
        if (!match || !dateStr) return
        const [y, mo, d] = dateStr.split('-').map(Number)
        const start = new Date(y, mo - 1, d, ...match.slice(1, 3).map(Number))
        const end = new Date(y, mo - 1, d, ...match.slice(3, 5).map(Number))
        const formatter = new Intl.DateTimeFormat(undefined, fmt.time)
        el.textContent = `${formatter.format(start)} – ${formatter.format(end)}`
      })
    </script>
    {% include event-calendar-script.html %}
  </body>
</html>
