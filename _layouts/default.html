<!doctype html>
<html lang="en">
  {% include head.html %}
  <body>
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="outer-container">
      <div class="hero-sticky-wrapper">
        <section class="hero">
          <p class="above-title hero-scale">Welcome To</p>
          <h1>Nectar</h1>
          <p class="subtitle">Fusion</p>
          <p class="below-title hero-scale">Playground</p>
        </section>
      </div>
      <main>{{ content }}</main>

      <footer>
        <p>
          original art by <a href="https://www.jasminecoart.com/">Jasmine Co</a>
        </p>
      </footer>
    </div>
    {% include events-filter-script.html %}
    <script>
      const fmt = { date: { dateStyle: 'long' }, time: { timeStyle: 'short' } }

      document.querySelectorAll('.event-meta time[datetime]').forEach((el) => {
        const [y, m, d] = el.getAttribute('datetime').split('-').map(Number)
        const date = new Date(y, m - 1, d)
        if (!isNaN(date)) {
          el.textContent = new Intl.DateTimeFormat(undefined, fmt.date).format(
            date
          )
        }
      })

      document.querySelectorAll('.event-meta .event-time').forEach((el) => {
        const dateStr = el.getAttribute('data-date')
        const timeStr = el.getAttribute('data-time')
        const match = timeStr?.match(
          /(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/
        )
        if (!match || !dateStr) return
        const [y, mo, d] = dateStr.split('-').map(Number)
        const start = new Date(y, mo - 1, d, ...match.slice(1, 3).map(Number))
        const end = new Date(y, mo - 1, d, ...match.slice(3, 5).map(Number))
        const formatter = new Intl.DateTimeFormat(undefined, fmt.time)
        el.textContent = `${formatter.format(start)} – ${formatter.format(end)}`
      })
    </script>
    {% include event-calendar-script.html %}
  </body>
</html>
