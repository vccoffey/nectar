<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
    </title>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  </head>
  <body>
    <div class="hero-sticky-wrapper">
      <section class="hero">
        <p class="above-title hero-scale">Welcome To</p>
        <h1>Nectar</h1>
        <p class="subtitle">Fusion</p>
        <p class="below-title hero-scale">Playground</p>
      </section>
    </div>
    <main>{{ content }}</main>

    <footer>
      <p>{{ site.title }}</p>
    </footer>
  </body>
</html>
