<div id="events" class="events-container" hidden>
  <section id="tonight" class="events-section standard-flex" hidden>
    <h2>Tonight</h2>
    <div class="events-list"></div>
  </section>
  <section id="upcoming" class="events-section standard-flex" hidden>
    <h2>Upcoming Dances</h2>
    <div class="events-list"></div>
  </section>
  <div class="events-pool">
    {% for event in site.data.events.events %} {% include event.html event=event
    %} {% endfor %}
  </div>
</div>
