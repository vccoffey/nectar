<section class="summer-notice">
  <h2>We're Taking the Summer Off</h2>
  <p>
    We'll be back in the fall with new dance events. In the meantime, sign up
    for our newsletter below.
  </p>
</section>

<div id="events" class="events-container">
  <section id="tonight" class="events-section standard-flex starts-hidden">
    <h2>Tonight</h2>
    <div class="events-list"></div>
  </section>
  <section id="upcoming" class="events-section standard-flex starts-hidden">
    <h2>Upcoming Dances</h2>
    <div class="events-list"></div>
  </section>
  <div class="events-pool">
    {% for event in site.data.events.events %} {% include event.html event=event
    %} {% endfor %}
  </div>
</div>
