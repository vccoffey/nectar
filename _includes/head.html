<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link
    rel="preload"
    href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}"
    as="style"
  />
  <meta
    name="description"
    content="{{ page.description | default: site.description }}"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Nunito:wght@300;400;600&display=block"
    onload="this.media = 'all'"
  />
  <noscript>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&family=Nunito:wght@300;400;600&display=block"
    />
  </noscript>
  <link
    rel="preload"
    href="{{ '/assets/fonts/girolight001-webfont.woff2' | relative_url }}"
    as="font"
    type="font/woff2"
    crossorigin
  />
  <link
    rel="preload"
    as="image"
    href="{{ '/assets/bg-placeholder.webp' | relative_url }}"
  />
  <link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" />
  <title>
    {% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}
  </title>
  <link
    rel="stylesheet"
    href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}"
  />
  <meta property="og:title" content="Nectar Fusion Playground" />
  <meta
    property="og:description"
    content="Queer-led fusion partner dance events in Portland, OR"
  />
  <meta
    property="og:image"
    content="https://nectarfusion.dance/assets/images/og-image.jpg"
  />
  <meta property="og:url" content="https://nectarfusion.dance" />
  <meta property="og:type" content="website" />

  <!-- Twitter/X card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta
    name="twitter:image"
    content="https://nectarfusion.dance/assets/images/og-image.jpg"
  />
  <meta name="twitter:title" content="Nectar Fusion Playground" />
  <meta
    name="twitter:description"
    content="Queer-led fusion partner dance events in Portland, OR"
  />
</head>
